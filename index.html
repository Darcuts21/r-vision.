<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Études | Lucien</title>
    <!-- On importe SortableJS pour le déplacement des tâches -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --primary: #38bdf8; --secondary: #10b981; --accent: #f59e0b; --danger: #ef4444;
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        
        header { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); padding: 1.5rem; text-align: center; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
        .editable-title { border: none; background: transparent; color: var(--primary); font-size: 1.8rem; font-weight: bold; text-align: center; width: 100%; outline: none; }

        .container { max-width: 1200px; margin: 30px auto; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; padding: 0 20px; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid #334155; position: relative; }

        /* --- POMODORO ANIMÉ --- */
        .pomo-wrapper { position: relative; width: 220px; height: 220px; margin: 0 auto 20px; }
        .pomo-svg { transform: rotate(-90deg); width: 220px; height: 220px; }
        .pomo-circle-bg { fill: none; stroke: #334155; stroke-width: 8; }
        .pomo-circle-prog { fill: none; stroke: var(--primary); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 628; stroke-dashoffset: 628; transition: stroke-dashoffset 1s linear; }
        .time-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2.5rem; font-weight: bold; font-family: monospace; text-shadow: 0 0 15px var(--primary); }

        /* --- TO DO LIST DÉPLAÇABLE --- */
        #taskList { min-height: 50px; }
        .task-row { 
            display: flex; align-items: center; gap: 12px; background: #334155; 
            padding: 12px; border-radius: 12px; margin-bottom: 10px; cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .task-row:active { cursor: grabbing; }
        .sortable-ghost { opacity: 0.4; background: var(--primary); }
        .task-input { border: none; background: transparent; color: white; width: 100%; outline: none; }
        .handle { color: #64748b; cursor: grab; font-size: 1.2rem; }

        /* --- PLANNING STYLÉ --- */
        .plan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .day-box { background: #334155; border-radius: 15px; padding: 15px; border-top: 4px solid var(--accent); transition: 0.3s; }
        .day-box:hover { transform: translateY(-5px); border-top-color: var(--primary); }
        .day-title { font-weight: bold; color: var(--primary); font-size: 0.9rem; text-transform: uppercase; margin-bottom: 10px; }
        .day-content { min-height: 60px; outline: none; font-size: 0.85rem; color: #cbd5e1; line-height: 1.5; }

        .btn { padding: 10px 20px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-p { background: var(--primary); color: var(--bg); }
        .btn-p:hover { filter: brightness(1.2); transform: scale(1.05); }

        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body onload="load()">

<header>
    <input type="text" id="title" class="editable-title" value="OBJECTIF BREVET | LUCIEN" oninput="save()">
</header>

<div class="container">
    <main>
        <!-- Planning -->
        <div class="card">
            <h3>📅 Planning de la Semaine</h3>
            <div class="plan-grid" id="plan">
                <!-- Les jours sont générés via JS -->
            </div>
        </div>

        <!-- To-Do List -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>✅ Ma To-Do (Drag & Drop)</h3>
                <button class="btn btn-p" onclick="addT()">+ Ajouter</button>
            </div>
            <div id="taskList"></div>
        </div>
    </main>

    <aside>
        <!-- Pomodoro Animé -->
        <div class="card" style="text-align: center;">
            <h3>⏳ Focus Session</h3>
            <div class="pomo-wrapper">
                <svg class="pomo-svg">
                    <circle class="pomo-circle-bg" cx="110" cy="110" r="100"></circle>
                    <circle id="prog" class="pomo-circle-prog" cx="110" cy="110" r="100"></circle>
                </svg>
                <div class="time-display" id="tm">25:00</div>
            </div>
            <div style="margin-bottom: 20px;">
                <select id="tSet" onchange="resetT()" style="background: #334155; color: white; border: none; padding: 8px; border-radius: 8px;">
                    <option value="25">Travail (25m)</option>
                    <option value="5">Pause (5m)</option>
                    <option value="45">Deep Work (45m)</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button id="sBtn" class="btn btn-p" onclick="toggleT()">Démarrer</button>
                <button class="btn" style="background:#475569; color:white;" onclick="resetT()">Reset</button>
            </div>
        </div>

        <div class="card">
            <h3>📈 Progression</h3>
            <div style="background:#334155; height:12px; border-radius:10px; overflow:hidden; margin:15px 0;">
                <div id="pb" style="background:var(--secondary); height:100%; width:0%; transition:1s;"></div>
            </div>
            <p id="pt" style="text-align:center; font-size:0.9rem;">0% révisé</p>
        </div>
    </aside>
</div>

<script>
    // Initialisation SortableJS pour le Drag & Drop
    const el = document.getElementById('taskList');
    Sortable.create(el, { animation: 150, handle: '.handle', onEnd: save });

    const days = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche"];
    let timer, s = 1500, isR = false, maxS = 1500;

    function addT(txt = "", chk = false) {
        const d = document.createElement('div');
        d.className = 'task-row';
        d.innerHTML = `
            <span class="handle">⠿</span>
            <input type="checkbox" ${chk ? 'checked' : ''} onclick="save()">
            <input type="text" class="task-input" value="${txt}" placeholder="Nouveau chapitre..." oninput="save()">
            <span style="cursor:pointer; color:var(--danger)" onclick="this.parentElement.remove();save()">✕</span>
        `;
        el.appendChild(d);
        save();
    }

    function save() {
        const data = {
            t: document.getElementById('title').value,
            tasks: Array.from(document.querySelectorAll('.task-row')).map(r => ({
                txt: r.querySelector('.task-input').value,
                done: r.querySelector('input[type="checkbox"]').checked
            })),
            plan: Array.from(document.querySelectorAll('.day-content')).map(d => d.innerHTML)
        };
        localStorage.setItem('lucien_v3', JSON.stringify(data));
        updateProg();
    }

    function load() {
        // Génération Planning
        const pGrid = document.getElementById('plan');
        days.forEach(day => {
            pGrid.innerHTML += `<div class="day-box"><div class="day-title">${day}</div><div class="day-content" contenteditable="true" oninput="save()"></div></div>`;
        });

        const saved = JSON.parse(localStorage.getItem('lucien_v3'));
        if (saved) {
            document.getElementById('title').value = saved.t;
            saved.tasks.forEach(t => addT(t.txt, t.done));
            const dConts = document.querySelectorAll('.day-content');
            saved.plan.forEach((c, i) => { if(dConts[i]) dConts[i].innerHTML = c; });
        } else {
            ["Maths", "Français"].forEach(t => addT(t));
        }
        updateProg();
        resetT();
    }

    function updateProg() {
        const all = document.querySelectorAll('input[type="checkbox"]');
        const chk = document.querySelectorAll('input[type="checkbox"]:checked');
        const p = all.length ? Math.round((chk.length / all.length) * 100) : 0;
        document.getElementById('pb').style.width = p + '%';
        document.getElementById('pt').innerText = p + '% révisé';
    }

    // --- LOGIQUE POMODORO ANIMÉ ---
    function resetT() {
        clearInterval(timer); isR = false;
        maxS = document.getElementById('tSet').value * 60;
        s = maxS;
        document.getElementById('sBtn').innerText = "Démarrer";
        updateUI();
    }

    function toggleT() {
        if (isR) { clearInterval(timer); document.getElementById('sBtn').innerText = "Reprendre"; }
        else {
            timer = setInterval(() => {
                if (s <= 0) { 
                    clearInterval(timer); new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play();
                    alert("C'est fini !"); resetT(); 
                } else { s--; updateUI(); }
            }, 1000);
            document.getElementById('sBtn').innerText = "Pause";
        }
        isR = !isR;
    }

    function updateUI() {
        const m = Math.floor(s / 60), sec = s % 60;
        document.getElementById('tm').innerText = `${m}:${sec < 10 ? '0' : ''}${sec}`;
        // Animation du cercle
        const offset = 628 - (s / maxS) * 628;
        document.getElementById('prog').style.strokeDashoffset = offset;
    }
</script>

</body>
</html>
